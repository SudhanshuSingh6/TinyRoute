spring.application.name=TinyRoute

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Tests use H2 + Hibernate create-drop. The Flyway migration is a Postgres pg_dump
# (IDENTITY columns, OWNER TO, \restrict) and is not H2-compatible, so disable it here.
spring.flyway.enabled=false

jwt.secret=fsgsgfdfgdfhdhe4t4334h
jwt.expiration=172800000

frontend.url=http://localhost:5173/

app.cookie.secure=false

spring.data.redis.host=localhost
spring.data.redis.port=6379

jwt.refresh-token-expiration=604800000
cache.redirect.ttl-seconds=300